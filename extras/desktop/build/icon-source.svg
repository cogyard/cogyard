<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- macOS Big Sur icon grid: 824x824 rounded tile centered in a 1024 canvas
       (100px padding), so it reads as a native app icon rather than a full-bleed
       square. cogyard mark = white six-checkmark wheel + amber cog on indigo. -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#3F3D9E"/>
  <g transform="translate(512,512) scale(8)">
    <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="butt" stroke-linejoin="miter">
      <path d="M-11,-29 L-2,-20 L12,-34"/>
      <path d="M-11,-29 L-2,-20 L12,-34" transform="rotate(60)"/>
      <path d="M-11,-29 L-2,-20 L12,-34" transform="rotate(120)"/>
      <path d="M-11,-29 L-2,-20 L12,-34" transform="rotate(180)"/>
      <path d="M-11,-29 L-2,-20 L12,-34" transform="rotate(240)"/>
      <path d="M-11,-29 L-2,-20 L12,-34" transform="rotate(300)"/>
    </g>
    <mask id="hub"><rect x="-14" y="-14" width="28" height="28" fill="#FFFFFF"/><circle r="3.5"/></mask>
    <g fill="#F59E0B" mask="url(#hub)">
      <circle r="8.5"/>
      <rect x="-3" y="-12" width="6" height="6"/>
      <rect x="-3" y="-12" width="6" height="6" transform="rotate(60)"/>
      <rect x="-3" y="-12" width="6" height="6" transform="rotate(120)"/>
      <rect x="-3" y="-12" width="6" height="6" transform="rotate(180)"/>
      <rect x="-3" y="-12" width="6" height="6" transform="rotate(240)"/>
      <rect x="-3" y="-12" width="6" height="6" transform="rotate(300)"/>
    </g>
  </g>
</svg>
