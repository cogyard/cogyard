<!-- Current-file toolbar actions (task 12). Native .btn-toggle buttons to match
     the portal's button system (the "raw"/"diff" toggles next to these); the
     popup menu appends to body so it escapes the toolbar's overflow. -->
<button class="btn-toggle fa-open" [disabled]="!path()" (click)="openMenu.toggle($event)">Open in<span class="caret"></span></button>
<p-menu #openMenu [model]="openItems()" [popup]="true" appendTo="body" />

@if (canDiscard()) {
  <button class="btn-toggle" [disabled]="!path()" (click)="discard()">Discard</button>
}

<p-confirmdialog />
